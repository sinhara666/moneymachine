<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin Studio вЂ” Money Machine Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
<style>
:root{
  --bg:#07071a;--surface:#0f0f2a;--surface2:#16163a;
  --border:rgba(255,255,255,0.07);
  --purple:#8B5CF6;--pl:#a78bfa;--cyan:#22d3ee;
  --green:#10b981;--pink:#f472b6;
  --text:#f0f0ff;--muted:#8888aa;
  --mono:'Space Mono',monospace;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--display);overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,26,0.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border)}
.nav-logo{font-size:17px;font-weight:800;color:var(--pl)}
.nav-logo span{color:var(--cyan)}
.btn-nav{background:var(--purple);color:#fff;border:none;border-radius:999px;padding:9px 20px;font-size:12px;font-family:var(--mono);font-weight:700;cursor:pointer}
.btn-nav:hover{background:var(--pl)}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 60px;position:relative}
.hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(139,92,246,0.18),transparent 70%);pointer-events:none}
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw var(--d) var(--dl) infinite;opacity:0}
@keyframes tw{0%,100%{opacity:0}50%{opacity:var(--op)}}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);border-radius:999px;padding:8px 18px;font-size:11px;font-family:var(--mono);color:var(--cyan);letter-spacing:.1em;margin-bottom:24px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-size:clamp(38px,8vw,72px);font-weight:900;line-height:1.05;margin-bottom:18px}
h1 em{font-style:normal;color:var(--pl)}
h1 em span{color:var(--cyan)}
.hero-sub{font-size:15px;color:var(--muted);max-width:480px;line-height:1.8;margin-bottom:40px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-hero{border:none;border-radius:999px;padding:15px 30px;font-size:14px;font-family:var(--mono);font-weight:700;cursor:pointer;transition:all .2s}
.btn-hero.p{background:linear-gradient(135deg,var(--purple),#6366f1);color:#fff}
.btn-hero.p:hover{opacity:.88;transform:translateY(-2px)}
.btn-hero.g{background:transparent;border:1.5px solid rgba(255,255,255,0.15);color:var(--text)}
.btn-hero.g:hover{border-color:var(--pl);transform:translateY(-2px)}

.wrap{max-width:900px;margin:0 auto;padding:0 24px}
.sec{padding:70px 0}
.sec-eye{font-size:10px;font-family:var(--mono);color:var(--cyan);letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
.sec-head{font-size:clamp(22px,4vw,32px);font-weight:800;margin-bottom:28px;line-height:1.2}
.divider{height:1px;background:var(--border)}

.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 16px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0,rgba(139,92,246,.1),transparent 65%);opacity:0;transition:opacity .22s}
.mc:hover{border-color:rgba(139,92,246,.45);transform:translateY(-3px)}
.mc:hover::after,.mc.sel::after{opacity:1}
.mc.sel{border-color:var(--purple);background:rgba(139,92,246,.08)}
.mc.custom-c{border-style:dashed;border-color:rgba(34,211,238,.25)}
.mc.custom-c.sel{border-style:solid;border-color:var(--cyan)}
.mc-badge{position:absolute;top:10px;right:10px;font-size:9px;font-family:var(--mono);padding:3px 7px;border-radius:4px}
.mc-badge.bk{background:rgba(34,211,238,.1);color:var(--cyan);border:1px solid rgba(34,211,238,.2)}
.mc-badge.ai{background:rgba(139,92,246,.15);color:var(--pl);border:1px solid rgba(139,92,246,.3)}
.mc-ico{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.mc-title{font-size:13px;font-weight:700;margin-bottom:3px}
.mc-sub{font-size:11px;color:var(--muted);font-family:var(--mono)}

.ngrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px;margin-bottom:18px}
.np{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;font-size:12px;font-family:var(--mono);color:var(--muted);text-align:center;transition:all .15s}
.np:hover{border-color:rgba(139,92,246,.4);color:var(--text)}
.np.sel{border-color:var(--purple);color:var(--pl);background:rgba(139,92,246,.08)}

input,textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 15px;font-size:13px;font-family:var(--mono);color:var(--text);outline:none;transition:border-color .2s;resize:vertical}
input:focus,textarea:focus{border-color:var(--purple)}
input::placeholder,textarea::placeholder{color:var(--muted)}
.irow{display:flex;gap:10px}.irow input{flex:1}
.ilabel{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.inote{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:6px}
.inote a{color:var(--cyan);text-decoration:none}

.btn{border:none;border-radius:999px;padding:12px 26px;font-size:13px;font-family:var(--mono);font-weight:700;cursor:pointer;transition:all .2s}
.btn.p{background:linear-gradient(135deg,var(--purple),#6366f1);color:#fff}
.btn.p:hover{opacity:.88;transform:translateY(-1px)}
.btn.g{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--text)}
.btn.g:hover{border-color:var(--pl);color:var(--pl)}
.btn.t{background:var(--cyan);color:#07071a;font-weight:700}
.btn.t:hover{opacity:.88}
.btn.sm{padding:8px 16px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}

.blueprint{background:var(--surface);border:1px solid rgba(139,92,246,.2);border-radius:20px;padding:28px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.blueprint::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(139,92,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.04) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.bp-title{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:16px}
.bp-canvas{position:relative;width:100%;height:280px}
canvas#gearCanvas{position:absolute;inset:0;width:100%;height:100%}
svg#bpSvg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.bpnode{position:absolute;opacity:0;transition:opacity .4s,transform .4s;transform:scale(.7)}
.bpnode.show{opacity:1;transform:scale(1)}
.bpnode-inner{background:var(--surface2);border:1.5px solid rgba(139,92,246,.3);border-radius:10px;padding:8px 12px;font-size:11px;font-family:var(--mono);color:var(--muted);white-space:nowrap;transition:all .4s}
.bpnode.lit .bpnode-inner{border-color:var(--purple);color:var(--pl);background:rgba(139,92,246,.12)}
.bpnode.done .bpnode-inner{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.07)}
.bpnode.center .bpnode-inner{font-size:13px;font-weight:700;border-color:var(--purple);color:var(--pl);background:rgba(139,92,246,.18)}
.bp-pbar-wrap{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:14px}
.bp-pbar{height:3px;background:linear-gradient(90deg,var(--purple),var(--cyan));border-radius:2px;width:0%;transition:width .5s}
.bp-status{font-size:12px;font-family:var(--mono);color:var(--muted);margin-top:10px;min-height:20px}
.bp-status em{color:var(--pl);font-style:normal}

/* DEMO CHAT */
.demo-box{background:var(--surface);border:1px solid rgba(34,211,238,.25);border-radius:16px;padding:24px;margin-bottom:20px}
.demo-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.demo-title{font-size:12px;font-family:var(--mono);color:var(--cyan);letter-spacing:.1em}
.demo-badge{font-size:9px;font-family:var(--mono);background:rgba(34,211,238,.1);color:var(--cyan);border:1px solid rgba(34,211,238,.2);border-radius:4px;padding:3px 8px}
.demo-messages{background:var(--surface2);border-radius:10px;padding:14px;height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.dmsg{max-width:85%;padding:10px 14px;border-radius:10px;font-size:12px;font-family:var(--mono);line-height:1.6}
.dmsg.bot{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.2);color:var(--pl);align-self:flex-start}
.dmsg.user{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.15);color:var(--cyan);align-self:flex-end}
.dmsg.typing{color:var(--muted);font-style:italic}
.demo-input-row{display:flex;gap:8px}
.demo-input-row input{flex:1;font-size:12px;padding:10px 14px}
.demo-note{font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:8px;text-align:center}

.ai-box{background:var(--surface);border:1px solid rgba(34,211,238,.2);border-radius:14px;padding:20px;margin-bottom:20px}
.ai-box-head{font-size:10px;font-family:var(--mono);color:var(--cyan);letter-spacing:.12em;margin-bottom:14px}
.chat-log{background:var(--surface2);border-radius:8px;padding:14px;max-height:180px;overflow-y:auto;font-family:var(--mono);font-size:12px;line-height:2}
.cm.user{color:var(--pl)}.cm.ai{color:var(--cyan)}.cm.sys{color:var(--muted);font-style:italic}

.pw-box{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(34,211,238,.06));border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:40px 28px;text-align:center;margin-top:4px}
.pw-box h3{font-size:24px;font-weight:900;margin-bottom:8px}
.pw-box p{font-size:13px;color:var(--muted);font-family:var(--mono);margin-bottom:26px;line-height:1.7}
.key-row{display:flex;gap:10px;max-width:380px;margin:0 auto 12px}
.phint{font-size:11px;color:var(--muted);font-family:var(--mono)}
.phint a{color:var(--cyan);text-decoration:none}
.shake{animation:shk .3s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.code-output{margin-top:20px}
.code-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.unlocked{font-size:11px;font-family:var(--mono);color:var(--green);background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:5px;padding:4px 10px}
.file-block{margin-bottom:20px}
.file-label{font-size:11px;font-family:var(--mono);color:var(--cyan);background:var(--surface2);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
pre{background:var(--surface);border:1px solid var(--border);border-radius:0 0 10px 10px;padding:20px;font-family:var(--mono);font-size:11px;line-height:1.9;color:#c4b5fd;max-height:320px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin:0}
.copy-file-btn{font-size:10px;font-family:var(--mono);background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);padding:3px 8px;cursor:pointer}
.copy-file-btn:hover{border-color:var(--pl);color:var(--pl)}
.overview-box{background:var(--surface);border:1px solid rgba(34,211,238,.15);border-radius:12px;padding:20px;margin-bottom:20px;font-family:var(--mono);font-size:12px;line-height:1.9;color:var(--muted)}
.overview-box strong{color:var(--cyan);display:block;margin-bottom:8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.folder-tree{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--surface2);border-radius:8px;padding:16px;margin-bottom:20px;line-height:1.9}
.folder-tree .dir{color:var(--pl)}
.folder-tree .file-t{color:var(--cyan)}
.dl-btns{display:flex;gap:10px;flex-wrap:wrap}

.hidden{display:none!important}
</style>
</head>

// ---- GEARS ----
function initBlueprint(){
  const canvas=document.getElementById('gearCanvas');
  const bp=document.getElementById('bpCanvas');
  canvas.width=bp.offsetWidth||340;canvas.height=280;
  document.getElementById('bpSvg').innerHTML='';
  document.querySelectorAll('.bpnode').forEach(n=>n.remove());
  if(gearAnimId){cancelAnimationFrame(gearAnimId);gearAnimId=null;}
  startGears(canvas);
  placeNodes(canvas.width,canvas.height);
}

function drawGearShape(ctx,x,y,r,teeth,angle,fc,sc){
  const inner=r*0.62,tooth=r*0.32,tw=0.16;
  ctx.beginPath();
  for(let i=0;i<teeth;i++){
    const a=angle+(i/teeth)*Math.PI*2;
    ctx.lineTo(Math.cos(a)*inner+x,Math.sin(a)*inner+y);
    ctx.lineTo(Math.cos(a)*(inner+tooth)+x,Math.sin(a)*(inner+tooth)+y);
    ctx.lineTo(Math.cos(a+tw)*(inner+tooth)+x,Math.sin(a+tw)*(inner+tooth)+y);
    ctx.lineTo(Math.cos(a+tw*2)*(inner+tooth)+x,Math.sin(a+tw*2)*(inner+tooth)+y);
    ctx.lineTo(Math.cos(a+tw*2)*inner+x,Math.sin(a+tw*2)*inner+y);
  }
  ctx.closePath();
  ctx.fillStyle=fc;ctx.fill();
  ctx.strokeStyle=sc;ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(x,y,r*0.2,0,Math.PI*2);ctx.fillStyle=sc;ctx.fill();
}

function startGears(canvas){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  const gears=[
    {x:w*.2,y:h*.38,r:42,teeth:12,speed:.007,active:false},
    {x:w*.48,y:h*.42,r:30,teeth:9,speed:-.011,active:false},
    {x:w*.73,y:h*.36,r:36,teeth:10,speed:.009,active:false},
    {x:w*.33,y:h*.71,r:24,teeth:7,speed:-.014,active:false},
    {x:w*.63,y:h*.68,r:28,teeth:8,speed:.012,active:false},
  ];
  let angles=gears.map(()=>0);
  function frame(){
    ctx.clearRect(0,0,w,h);
    gears.forEach((g,i)=>{
      if(g.active)angles[i]+=g.speed;
      const fc=g.active?'rgba(139,92,246,0.22)':'rgba(139,92,246,0.06)';
      const sc=g.active?'rgba(139,92,246,0.6)':'rgba(139,92,246,0.15)';
      drawGearShape(ctx,g.x,g.y,g.r,g.teeth,angles[i],fc,sc);
    });
    gearAnimId=requestAnimationFrame(frame);
  }
  frame();
  canvas._gears=gears;
  canvas._activateGear=n=>{if(n<gears.length)gears[n].active=true;};
  canvas._activateAll=()=>gears.forEach(g=>g.active=true);
}

function placeNodes(w,h){
  const mods=MODULES[chosenType]||MODULES.chatbot;
  const svg=document.getElementById('bpSvg');
  const bp=document.getElementById('bpCanvas');
  const positions=[[.5,.1],[.1,.28],[.87,.28],[.1,.62],[.87,.62],[.28,.82],[.72,.82],[.5,.9]];
  const cx=w*.5,cy=h*.44;
  const cEl=makeNode(chosenName||'Core',true);
  cEl.style.left=(cx-55)+'px';cEl.style.top=(cy-18)+'px';
  bp.appendChild(cEl);
  setTimeout(()=>cEl.classList.add('show'),100);
  mods.forEach((mod,i)=>{
    if(i>=positions.length)return;
    const [lp,tp]=positions[i];
    const el=makeNode(mod,false);
    el.style.left=(w*lp-45)+'px';el.style.top=(h*tp)+'px';
    bp.appendChild(el);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx);line.setAttribute('y1',cy);
    line.setAttribute('x2',w*lp);line.setAttribute('y2',h*tp+14);
    line.setAttribute('stroke','rgba(139,92,246,0)');
    line.setAttribute('stroke-width','1.5');
    line.setAttribute('stroke-dasharray','5 4');
    svg.appendChild(line);
  });
}

function makeNode(label,isCenter){
  const el=document.createElement('div');
  el.className='bpnode'+(isCenter?' center':'');
  el.innerHTML=`<div class="bpnode-inner">${label}</div>`;
  return el;
}

function runBlueprint(onDone){
  const msgs=STATUS_MSGS[chosenType]||STATUS_MSGS.chatbot;
  const nodes=[...document.querySelectorAll('.bpnode:not(.center)')];
  const lines=[...document.getElementById('bpSvg').querySelectorAll('line')];
  const bar=document.getElementById('bpBar');
  const status=document.getElementById('bpStatus');
  const canvas=document.getElementById('gearCanvas');
  let i=0;
  function next(){
    if(i<nodes.length){
      nodes[i].classList.add('show','lit');
      if(lines[i])lines[i].setAttribute('stroke','rgba(139,92,246,0.5)');
      if(canvas._activateGear)canvas._activateGear(i%5);
      bar.style.width=Math.round(((i+1)/nodes.length)*88)+'%';
      status.innerHTML='<em>></em> '+(msgs[i]||'Building...');
      i++;setTimeout(next,580+Math.random()*260);
    } else {
      nodes.forEach(n=>{n.classList.remove('lit');n.classList.add('done');});
      if(canvas._activateAll)canvas._activateAll();
      bar.style.width='100%';
      status.innerHTML='<em style="color:var(--cyan)">&#10003;</em> '+(chosenName||'Machine')+' assembled.';
      document.getElementById('buildTitle').textContent=(chosenName||'Your machine')+' is ready.';
      setTimeout(onDone,900);
    }
  }
  setTimeout(next,500);
}

async function callDemoGroq(message){
  if(!DEMO_KEY){
    addDemoMsg('Demo mode: Add a Groq key to DEMO_KEY in the HTML to enable live chat. The full version uses your own key.','bot');
    return;
  }
  const typing=document.createElement('div');
  typing.className='dmsg bot typing';typing.textContent='thinking...';
  document.getElementById('demoMessages').appendChild(typing);

  const sysFn=SYSTEM_PROMPTS[chosenType]||SYSTEM_PROMPTS.chatbot;
  const system=sysFn(chosenName,chosenNiche||chosenType);
  demoHistory.push({role:'user',content:message});

  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+DEMO_KEY},
      body:JSON.stringify({
        model:'llama3-70b-8192',
        messages:[{role:'system',content:system},...demoHistory.slice(-6)],
        max_tokens:256,temperature:0.7
      })
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||'Sorry, I could not respond right now.';
    typing.remove();
    demoHistory.push({role:'assistant',content:reply});
    addDemoMsg(reply,'bot');
  }catch(e){
    typing.remove();
    addDemoMsg('Demo temporarily unavailable. Unlock the full version to run it with your own key.','bot');
  }
}

async function callGroqGen(apiKey,description){
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify({
      model:'llama3-70b-8192',
      messages:[
        {role:'system',content:`You are a senior Node.js developer. Generate COMPLETE, production-ready code.
Use Groq API (process.env.GROQ_API_KEY) primary, Ollama fallback.
Include: dotenv config, full config object, all async functions with real logic, Express routes, error handling, comments.
Must be 100% runnable after npm install + adding API keys.
Return ONLY the code. No markdown. No backticks. No explanation.`},
        {role:'user',content:'Build this complete tool: '+description}
      ],
      max_tokens:3500,temperature:0.2
    })
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'Groq error '+res.status);}
  return (await res.json()).choices[0].message.content;
}

// ---- KEY CHECK ----
async function checkKey(){
  const raw=document.getElementById('licenseKey').value.trim();
  const k=raw.toUpperCase();
  if(!k)return;
  const btn=document.getElementById('unlockBtn');
  const inp=document.getElementById('licenseKey');
  btn.textContent='Checking...';btn.disabled=true;
  try{
    const res=await fetch(KEY_API+'?key='+encodeURIComponent(k));
    const data=await res.json();
    if(data.valid){
      hide('paywall');
      if(chosenType==='custom'){
        renderCustomCode();
      } else {
        const output=buildOutput(chosenType,chosenName,chosenNiche);
        renderOutput(output);
      }
      show('codeReveal');goTo('codeReveal');
    } else if(data.reason==='already_used'){
      inp.style.borderColor='#f87171';
      document.querySelector('.pw-box p').innerHTML='This key has already been used.<br><a href="https://simmonstia.gumroad.com" target="_blank" style="color:var(--cyan)">Get a new key at Sin Studio</a>';
    } else {
      inp.classList.add('shake');inp.style.borderColor='#f87171';
      setTimeout(()=>{inp.classList.remove('shake');inp.style.borderColor='';},800);
    }
  }catch(e){
    inp.style.borderColor='#f87171';
    document.querySelector('.pw-box p').innerHTML='Could not connect. Check your connection and try again.';
  }finally{
    btn.textContent='Unlock';btn.disabled=false;
  }
}

// ---- RENDER OUTPUT ----
function renderOutput(output){
  const el=document.getElementById('codeOutput');el.innerHTML='';
  const ov=document.createElement('div');ov.className='overview-box';
  ov.innerHTML=`<strong>// project overview</strong>${output.overview.replace(/\n/g,'<br>')}`;
  el.appendChild(ov);
  const tr=document.createElement('div');tr.className='folder-tree';
  tr.innerHTML=`<div style="font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;text-transform:uppercase">// folder structure</div>`+
    output.tree.split('\n').map(line=>{
      if(line.match(/\.(js|json|md|env)/)) return `<span class="file-t">${line}</span>`;
      if(line.endsWith('/')) return `<span class="dir">${line}</span>`;
      return line;
    }).join('<br>');
  el.appendChild(tr);
  output.files.forEach(f=>{
    const block=document.createElement('div');block.className='file-block';
    const label=document.createElement('div');label.className='file-label';
    label.innerHTML=`<span>${f.name}</span><button class="copy-file-btn" onclick="copyFile(this)">copy</button>`;
    const pre=document.createElement('pre');pre.textContent=f.code;pre.dataset.code=f.code;
    block.appendChild(label);block.appendChild(pre);el.appendChild(block);
  });
}

function copyFile(btn){
  const code=btn.closest('.file-block').querySelector('pre').dataset.code;
  navigator.clipboard.writeText(code).then(()=>{btn.textContent='copied!';setTimeout(()=>btn.textContent='copy',1500);});
}

function copyAll(){
  const all=[...document.querySelectorAll('#codeOutput pre')].map(p=>p.dataset.code||p.textContent).join('\n\n// ========\n\n');
  navigator.clipboard.writeText(all).then(()=>{
    const b=document.getElementById('copyAllBtn');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy all',1500);
  });
}

// ---- ZIP DOWNLOAD ----
async function downloadZip(){
  const btn=document.getElementById('zipBtn');
  btn.textContent='Building ZIP...';btn.disabled=true;
  try{
    const zip=new JSZip();
    const folderName=(chosenName||'machine').toLowerCase().replace(/\s+/g,'-');
    const folder=zip.folder(folderName);
    const blocks=[...document.querySelectorAll('#codeOutput .file-block')];
    blocks.forEach(block=>{
      const fileName=block.querySelector('.file-label span').textContent.replace(' (AI generated)','');
      const code=block.querySelector('pre').dataset.code||block.querySelector('pre').textContent;
      const parts=fileName.split('/');
      if(parts.length>1){
        const subFolder=folder.folder(parts.slice(0,-1).join('/'));
        subFolder.file(parts[parts.length-1],code);
      } else {
        folder.file(fileName,code);
      }
    });
    const blob=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=folderName+'.zip';a.click();
    URL.revokeObjectURL(url);
    btn.textContent='&#11015; Download ZIP';
  }catch(e){
    btn.textContent='ZIP failed вЂ” try copy instead';
  }finally{
    btn.disabled=false;
  }
}
