<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hu - Fitness AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Space Mono', monospace;
      background-color: #06080f;
      color: #f0faff;
    }
    .sidebar {
      width: 240px;
      background-color: #0c1020;
      padding: 20px;
      display: none;
    }
    .sidebar-mobile {
      display: block;
    }
    .main {
      padding: 20px;
    }
    .message-bubble {
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .message-bubble-bot {
      background-color: #cc00ff;
      margin-left: 20px;
    }
    .message-bubble-user {
      background-color: #00f0ff;
      margin-right: 20px;
      align-self: flex-end;
    }
    .typing-indicator {
      margin-left: 20px;
      font-size: 12px;
    }
    .typing-indicator::after {
      content: " ...";
      animation: typing 1s infinite;
    }
    @keyframes typing {
      0% {
        content: " ...";
      }
      25% {
        content: " ..";
      }
      50% {
        content: " .";
      }
      75% {
        content: " ..";
      }
      100% {
        content: " ...";
      }
    }
    .button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background-color: #0c1020;
      color: #f0faff;
      cursor: pointer;
      box-shadow: 0 0 10px #cc00ff;
    }
    .button:hover {
      box-shadow: 0 0 20px #cc00ff;
    }
    .online-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #00ff88;
      display: inline-block;
      margin-right: 10px;
    }
    .settings-button {
      position: fixed;
      bottom: 10px;
      left: 10px;
      width: 44px;
      height: 44px;
      opacity: 0;
      cursor: pointer;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
    }
    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #0c1020;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <h2 style="color: #cc00ff;">Hu</h2>
    <p style="color: #00f0ff;">Fitness</p>
    <div class="online-dot"></div>
    <button class="button" id="prompt-1">What is the best workout routine for weight loss?</button>
    <button class="button" id="prompt-2">How can I improve my running endurance?</button>
    <button class="button" id="prompt-3">What are the benefits of yoga for flexibility?</button>
    <button class="button" id="prompt-4">How can I track my progress and stay motivated?</button>
    <button class="button" id="prompt-5">What is the best way to recover after a intense workout?</button>
  </div>
  <div class="sidebar-mobile" id="sidebar-mobile">
    <h2 style="color: #cc00ff;">Hu</h2>
    <p style="color: #00f0ff;">Fitness</p>
    <div class="online-dot"></div>
  </div>
  <div class="main" id="main">
    <div id="messages"></div>
    <input type="text" id="input" placeholder="Type a message...">
    <button class="button" id="send">Send</button>
  </div>
  <div class="settings-button" id="settings-button"></div>
  <div class="modal" id="password-modal">
    <div class="modal-content">
      <h2>Password</h2>
      <input type="password" id="password">
      <button class="button" id="password-submit">Submit</button>
    </div>
  </div>
  <div class="modal" id="settings-modal">
    <div class="modal-content">
      <h2>Settings</h2>
      <input type="text" id="groq-key" placeholder="Groq Key">
      <button class="button" id="save-settings">Save</button>
    </div>
  </div>
  <script>
    let messages = [];
    let groqKey = localStorage.getItem('_bk');
    if (groqKey) {
      groqKey = xor(groqKey, 'SINSTUDIO');
    }
    function xor(a, b) {
      let result = '';
      for (let i = 0; i < a.length; i++) {
        result += String.fromCharCode(a.charCodeAt(i) ^ b.charCodeAt(i % b.length));
      }
      return result;
    }
    if (groqKey) {
      document.getElementById('messages').innerHTML = '<p>Welcome to Hu, your fitness AI chatbot!</p>';
    } else {
      document.getElementById('messages').innerHTML = '<p>Contact the owner for access.</p>';
    }
    document.getElementById('send').addEventListener('click', async () => {
      let input = document.getElementById('input').value;
      if (input) {
        messages.push({ text: input, user: true });
        document.getElementById('input').value = '';
        document.getElementById('messages').innerHTML = '';
        for (let message of messages) {
          if (message.user) {
            document.getElementById('messages').innerHTML += `<div class="message-bubble message-bubble-user">${message.text}</div>`;
          } else {
            document.getElementById('messages').innerHTML += `<div class="message-bubble message-bubble-bot">${message.text}</div>`;
          }
        }
        let response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${groqKey}`
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            prompt: `You are Hu, expert AI Chatbot for Fitness. Speak English. Help with: User onboarding flow, Lead capture form, FAQ auto-answer. Stay in character. 2-4 sentence replies.\n${input}`
          })
        });
        let data = await response.json();
        messages.push({ text: data.completions[0].text, user: false });
        document.getElementById('messages').innerHTML = '';
        for (let message of messages) {
          if (message.user) {
            document.getElementById('messages').innerHTML += `<div class="message-bubble message-bubble-user">${message.text}</div>`;
          } else {
            document.getElementById('messages').innerHTML += `<div class="message-bubble message-bubble-bot">${message.text}</div>`;
          }
        }
      }
    });
    document.getElementById('settings-button').addEventListener('click', () => {
      document.getElementById('password-modal').style.display = 'block';
    });
    document.getElementById('password-submit').addEventListener('click', () => {
      let password = document.getElementById('password').value;
      if (password === 'happy') {
        document.getElementById('password-modal').style.display = 'none';
        document.getElementById('settings-modal').style.display = 'block';
      }
    });
    document.getElementById('save-settings').addEventListener('click', () => {
      let key = document.getElementById('groq-key').value;
      localStorage.setItem('_bk', xor(key, 'SINSTUDIO'));
      groqKey = key;
      document.getElementById('settings-modal').style.display = 'none';
      document.getElementById('messages').innerHTML = '<p>Welcome to Hu, your fitness AI chatbot!</p>';
    });
    document.getElementById('prompt-1').addEventListener('click', () => {
      document.getElementById('input').value = 'What is the best workout routine for weight loss?';
      document.getElementById('send').click();
    });
    document.getElementById('prompt-2').addEventListener('click', () => {
      document.getElementById('input').value = 'How can I improve my running endurance?';
      document.getElementById('send').click();
    });
    document.getElementById('prompt-3').addEventListener('click', () => {
      document.getElementById('input').value = 'What are the benefits of yoga for flexibility?';
      document.getElementById('send').click();
    });
    document.getElementById('prompt-4').addEventListener('click', () => {
      document.getElementById('input').value = 'How can I track my progress and stay motivated?';
      document.getElementById('send').click();
    });
    document.getElementById('prompt-5').addEventListener('click', () => {
      document.getElementById('input').value = 'What is the best way to recover after a intense workout?';
      document.getElementById('send').click();
    });
  </script>
</html>
